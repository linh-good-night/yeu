<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trái tim 3D chuyển động</title>
  <style>
    :root {
      color-scheme: dark;
      --glow: rgba(255, 96, 128, 0.9);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 96, 128, 0.25), transparent 30%),
        radial-gradient(circle at 80% 80%, rgba(255, 182, 193, 0.22), transparent 28%),
        linear-gradient(135deg, #06020d 0%, #13061b 45%, #05010b 100%);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: white;
    }

    body {
      display: grid;
      place-items: center;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      perspective: 1200px;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
      animation: driftScene 8s ease-in-out infinite;
    }

    .stage {
      position: relative;
      width: min(70vw, 760px);
      max-width: 760px;
      aspect-ratio: 1 / 1;
      transform-style: preserve-3d;
      animation: swingHeart 6.5s ease-in-out infinite;
    }

    .heart-field {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      animation: pulseField 4.2s ease-in-out infinite;
    }

    .heart-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      font-size: calc(4px + var(--size) * 1px);
      line-height: 1;
      color: color-mix(in srgb, var(--glow) 70%, white 30%);
      text-shadow: 0 0 10px rgba(255,255,255,0.35), 0 0 18px rgba(255,96,128,0.35);
      transform: translate(-50%, -50%) translate3d(var(--x), var(--y), var(--z)) scale(var(--scale));
      filter: saturate(1.2);
      animation: floatDot 4.8s cubic-bezier(0.25, 0.1, 0.25, 1) infinite;
      animation-delay: calc(var(--delay) * -1s);
      opacity: 0.8;
    }

    .glow {
      position: absolute;
      inset: auto;
      width: 56%;
      height: 56%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,120,150,0.18) 0%, rgba(255,120,150,0.02) 55%, transparent 70%);
      filter: blur(25px);
      transform: translateZ(-140px);
      pointer-events: none;
    }

    .heart-center {
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      transform-style: preserve-3d;
      font-size: clamp(2rem, 4.5vw, 3.6rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      white-space: nowrap;
      text-transform: none;
      font-family: "Dancing Script", "Brush Script MT", cursive, "Segoe UI";
      color: #fff7fb;
      background: linear-gradient(135deg, #ffe7f5 0%, #ffb3d1 30%, #ff84b0 70%, #ffd9e8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 14px rgba(255,255,255,0.35), 0 0 30px rgba(255,96,128,0.45);
      z-index: 5;
      animation: centerPulse 3.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      cursor: pointer;
      user-select: none;
      filter: drop-shadow(0 0 16px rgba(255, 120, 160, 0.35));
      backface-visibility: hidden;
    }
    .heart-center.flip {
      animation: flipText 1s ease-in-out forwards;
    }
    .heart-center.clicked {
      animation: centerGlow 1.5s ease-in-out infinite;
    }
    @keyframes centerGlow {
      0%, 100% { text-shadow: 0 0 10px rgba(255,255,255,0.6), 0 0 28px rgba(255,96,128,0.75); }
      50% { text-shadow: 0 0 24px rgba(255,255,255,0.85), 0 0 40px rgba(255,96,128,0.95); }
    }
    @keyframes flipText {
      0% { transform: translate(-50%, -50%) rotateY(0deg); }
      40% { transform: translate(-50%, -50%) rotateY(60deg); }
      70% { transform: translate(-50%, -50%) rotateY(100deg); }
      100% { transform: translate(-50%, -50%) rotateY(180deg); }
    }

    .heart-rain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      pointer-events: none;
      z-index: 4;
    }

    .tiny-heart {
      position: absolute;
      top: var(--start-top, -12vh);
      left: var(--start-x);
      font-size: var(--size);
      color: color-mix(in srgb, var(--glow) 80%, white 20%);
      text-shadow: 0 0 10px rgba(255,255,255,0.55);
      opacity: var(--opacity);
      animation: fallHeart var(--duration) cubic-bezier(0.22, 0.61, 0.36, 1) infinite;
      animation-delay: var(--delay);
      transform: translate3d(0, 0, 0);
    }

    .caption {
      position: absolute;
      bottom: 4%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: clamp(0.9rem, 1.4vw, 1.3rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.78);
      text-shadow: 0 0 12px rgba(255,96,128,0.35);
      pointer-events: none;
    }

    @keyframes driftScene {
      0%, 100% { transform: rotateX(12deg) rotateY(-18deg) translateY(0px); }
      50% { transform: rotateX(-8deg) rotateY(16deg) translateY(-16px); }
    }

    @keyframes swingHeart {
      0%, 100% { transform: rotateZ(-3deg) rotateX(12deg); }
      50% { transform: rotateZ(4deg) rotateX(-8deg); }
    }

    @keyframes pulseField {
      0%, 100% { transform: scale(0.96) rotateZ(0deg); }
      50% { transform: scale(1.02) rotateZ(2deg); }
    }

    @keyframes floatDot {
      0%, 100% { transform: translate(-50%, -50%) translate3d(var(--x), var(--y), var(--z)) scale(var(--scale)); }
      50% { transform: translate(-50%, -50%) translate3d(calc(var(--x) + 5px), calc(var(--y) - 7px), calc(var(--z) + 6px)) scale(calc(var(--scale) * 1.06)); }
    }

    @keyframes centerPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(0.96) rotate(-0.8deg); }
      25% { transform: translate(-50%, -50%) scale(1.01) rotate(0.8deg); }
      50% { transform: translate(-50%, -50%) scale(1.04) rotate(-0.4deg); }
      75% { transform: translate(-50%, -50%) scale(1.01) rotate(0.8deg); }
    }

    @keyframes fallHeart {
      0% { transform: translate3d(0, -12vh, 0) rotate(0deg); opacity: 0; }
      8% { opacity: var(--opacity); }
      100% { transform: translate3d(var(--drift), 112vh, 0) rotate(360deg); opacity: 0.6; }
    }
  </style>
</head>
<body>
  <div class="heart-rain" id="heartRain"></div>
  <div class="scene">
    <div class="stage">
      <div class="glow"></div>
      <div class="heart-field" id="heartField"></div>
      <div class="heart-center" id="heartCenter">chạm vào tôi</div>
    </div>

  </div>

  <script>
    const field = document.getElementById('heartField');
    const rain = document.getElementById('heartRain');
    const count = 760;
    const width = 760;
    const height = 760;
    const heartPoints = [];

    for (let i = 0; i < count; i++) {
      const t = (i / count) * Math.PI * 2;
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
      heartPoints.push({ x, y });
    }

    const maxX = 16;
    const maxY = 16;

    heartPoints.forEach((point, index) => {
      const dot = document.createElement('span');
      dot.className = 'heart-dot';

      const x = (point.x / maxX) * (width * 0.48);
      const y = (point.y / maxY) * (height * 0.48) * -1;
      const z = (Math.random() - 0.5) * 60;
      const size = 6 + Math.random() * 6;
      const scale = 0.75 + Math.random() * 0.55;
      const delay = (Math.random() * 3.2).toFixed(2);
      const hue = 330 + Math.random() * 25;

      dot.style.setProperty('--x', `${x}px`);
      dot.style.setProperty('--y', `${y}px`);
      dot.style.setProperty('--z', `${z}px`);
      dot.style.setProperty('--size', `${size}`);
      dot.style.setProperty('--scale', `${scale}`);
      dot.style.setProperty('--delay', `${delay}`);
      dot.style.color = `hsl(${hue} 90% 70%)`;
      dot.textContent = '♥';
      dot.style.opacity = `${0.55 + Math.random() * 0.45}`;
      field.appendChild(dot);
    });

    const centerText = document.getElementById('heartCenter');
    centerText.addEventListener('click', () => {
      centerText.classList.add('flip');
      setTimeout(() => {
        centerText.textContent = 'linh yêu ánh';
        centerText.classList.add('clicked');
      }, 850);
    });

    for (let i = 0; i < 140; i++) {
      const mini = document.createElement('span');
      mini.className = 'tiny-heart';
      mini.textContent = '♥';
      const offset = -20 + Math.random() * 140;
      mini.style.setProperty('--start-x', `${offset}%`);
      mini.style.setProperty('--drift', `${(Math.random() - 0.5) * 320}px`);
      mini.style.setProperty('--size', `${8 + Math.random() * 20}px`);
      mini.style.setProperty('--opacity', `${0.2 + Math.random() * 0.7}`);
      mini.style.setProperty('--duration', `${6 + Math.random() * 6}s`);
      mini.style.setProperty('--delay', `${-Math.random() * 14}s`);
      mini.style.setProperty('--start-top', `${-8 - Math.random() * 16}vh`);
      mini.style.color = `hsl(${330 + Math.random() * 30} 95% 75%)`;
      rain.appendChild(mini);
    }
  </script>
</body>
</html>
